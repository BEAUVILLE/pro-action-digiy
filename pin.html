<!doctype html>
<html lang="fr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>Accès PRO — La Voix du Business</title><meta name="theme-color" content="#06130f"><style>
:root{--bg:#06130f;--card:#10261e;--text:#fff8e8;--muted:rgba(255,248,232,.72);--gold:#f4c86a;--green:#2ee58b;--line:rgba(255,255,255,.14)}*{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;background:radial-gradient(circle at top left,rgba(244,200,106,.18),transparent 34%),linear-gradient(135deg,var(--bg),#081008,#142014);color:var(--text);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;padding:16px}.box{width:min(520px,100%);border:1px solid var(--line);background:linear-gradient(180deg,rgba(255,255,255,.10),rgba(255,255,255,.05));border-radius:28px;padding:24px;box-shadow:0 24px 70px rgba(0,0,0,.38)}h1{font-size:clamp(34px,7vw,54px);line-height:.95;margin:0 0 12px;letter-spacing:-.05em}.muted{color:var(--muted);font-weight:760;line-height:1.55}.pin{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin:18px 0}.pin input{height:64px;text-align:center;border-radius:18px;border:1px solid var(--line);background:rgba(0,0,0,.22);color:var(--text);font-size:30px;font-weight:1000;outline:none}.btn{width:100%;min-height:56px;border:0;border-radius:18px;background:linear-gradient(135deg,#ffe3a0,var(--gold));color:#0c1a10;font-weight:1000;font-size:16px;cursor:pointer}.ghost{display:flex;justify-content:center;margin-top:12px;color:var(--muted);font-weight:850;text-decoration:none}.err{display:none;margin-top:14px;padding:13px;border:1px solid rgba(255,120,120,.35);background:rgba(255,120,120,.10);border-radius:16px;color:#ffd6d6;font-weight:900}</style></head><body><main class="box"><div class="muted">🔒 Porte PRO protégée</div><h1>La Voix du Business</h1><p class="muted">Entre le code 4 chiffres pour ouvrir ACTION DIGIY PRO. La porte publique reste ouverte, les actions métier restent protégées.</p><div class="pin"><input maxlength="1" inputmode="numeric"><input maxlength="1" inputmode="numeric"><input maxlength="1" inputmode="numeric"><input maxlength="1" inputmode="numeric"></div><button class="btn" id="go">Ouvrir l’espace PRO</button><div class="err" id="err">Code incorrect. Vérifie le PIN.</div><a class="ghost" href="./">← Retour porte publique</a></main><script>
// ⚠️ Mets ici le PIN PRO 4 chiffres du dépôt ACTION DIGIY.
// Tu peux en mettre plusieurs pendant une transition : ["1234","5678"]
const DIGIY_ALLOWED_PINS = ["2026"];
const SESSION_KEY = "DIGIY_ACTION_PRO_SESSION";
const inputs = [...document.querySelectorAll('.pin input')];
const err = document.getElementById('err');
inputs[0].focus();
inputs.forEach((inp,i)=>{inp.addEventListener('input',()=>{inp.value=inp.value.replace(/\D/g,'').slice(0,1); if(inp.value && inputs[i+1]) inputs[i+1].focus();}); inp.addEventListener('keydown',e=>{if(e.key==='Backspace'&&!inp.value&&inputs[i-1])inputs[i-1].focus();});});
function backPage(){const u=new URL(location.href);return u.searchParams.get('back')||'pro.html'}
function open(){const pin=inputs.map(i=>i.value).join(''); if(DIGIY_ALLOWED_PINS.includes(pin)){const until=Date.now()+8*60*60*1000; const s={ok:true,until,createdAt:new Date().toISOString(),source:'pin'}; sessionStorage.setItem(SESSION_KEY,JSON.stringify(s)); localStorage.setItem(SESSION_KEY,JSON.stringify(s)); location.href='./'+backPage();}else{err.style.display='block'; inputs.forEach(i=>i.value=''); inputs[0].focus();}}
document.getElementById('go').onclick=open;document.addEventListener('keydown',e=>{if(e.key==='Enter')open();});
</script></body></html>
